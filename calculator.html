<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Project</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .calculator {
        background-color: #222;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    #display {
        width: 100%;
        height: 50px;
        font-size: 24px;
        text-align: right;
        margin-bottom: 10px;
        border: none;
        border-radius: 5px;
        padding-right: 10px;
        box-sizing: border-box;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 60px);
        gap: 10px;
    }

    button {
        height: 50px;
        font-size: 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.8;
    }

    .operator {
        background-color: orange;
        color: white;
    }

    .equal {
        background-color: green;
        color: white;
    }

    .clear {
        background-color: red;
        color: white;
    }
</style>
</head>
<body>
<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">/</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">*</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">-</button>

        <button>0</button>
        <button>.</button>
        <button class="equal">=</button>
        <button class="operator">+</button>

        <button class="clear">C</button>
    </div>
</div>
<script>
let display = document.getElementById("display");
let buttons = document.querySelectorAll("button");
for (let i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener("click", function () {
        let value = this.innerText;
        if (value === "C") {
            display.value = "";
        }
        else if (value === "=") {

            if (display.value === "") {
                display.value = "";
            }
            else {
                try {
                    display.value = eval(display.value);
                }
                catch {
                    display.value = "Error";
                }
            }
        }
        else {
            display.value += value;
        }

    });

}

</script>

</body>
</html>
